[workspace]
resolver = "2"
members = [
    "crates/nexus-core",
    "crates/nexusd",
    "crates/nexus-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/shayne/nexuscontext"

[workspace.dependencies]
nexus-core = { path = "crates/nexus-core" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "fs", "io-util", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
toml = "0.8"
clap = { version = "4", features = ["derive"] }
directories = "5"
